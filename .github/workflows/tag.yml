name: tag-and-release

on:
  push:
    branches:
      - main

# Prevent overlapping releases if two merges land close together.
concurrency:
  group: tag-and-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true
      - run: go build ./...
      - run: go test ./...

  tag-and-release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags are required to compute the next version.
          fetch-depth: 0

      - name: Compute and push next version tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Bump from conventional-commit messages since the last tag:
          #   feat:            -> minor
          #   fix:/others      -> patch
          #   feat!: / BREAKING -> major
          default_bump: patch
          tag_prefix: v

      # The tag was pushed to the remote after this job's checkout, so the local
      # clone doesn't have it and HEAD is still detached at the pre-tag commit.
      # Fetch the new tag and check it out so GoReleaser sees the tag sitting
      # exactly on HEAD (otherwise it fails its "tag not made against commit" guard).
      - name: Check out the new tag
        if: steps.tag.outputs.new_tag != ''
        run: |
          git fetch --force --tags origin
          git checkout --force "${{ steps.tag.outputs.new_tag }}"

      - name: Set up Go
        if: steps.tag.outputs.new_tag != ''
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Import GPG key
        if: steps.tag.outputs.new_tag != ''
        uses: crazy-max/ghaction-import-gpg@v6
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      - name: Run GoReleaser
        if: steps.tag.outputs.new_tag != ''
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The tag was just created at HEAD; point GoReleaser at it explicitly.
          GORELEASER_CURRENT_TAG: ${{ steps.tag.outputs.new_tag }}
